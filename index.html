<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="description" content="Bai Zeyang (Rvosuke) academic homepage.">
  <title>Bai Zeyang | Academic Homepage</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="page">
    <header class="hero" id="hero">
      <div class="hero-text">
        <h1 id="name"></h1>
        <p id="tagline"></p>
      </div>
      <div class="lang-controls" role="group" aria-label="Language switcher">
        <button type="button" data-lang="en" id="lang-en">EN</button>
        <button type="button" data-lang="zh" id="lang-zh">中文</button>
      </div>
    </header>

    <main class="content-grid">
      <section class="card" id="about-section">
        <h2 id="about-title"></h2>
        <p id="about-text"></p>
      </section>

      <section class="card" id="interests-section">
        <h2 id="interests-title"></h2>
        <ul id="interests-list"></ul>
      </section>

      <section class="card" id="publications-section">
        <h2 id="publications-title"></h2>
        <ul id="publications-list"></ul>
      </section>

      <section class="card" id="projects-section">
        <h2 id="projects-title"></h2>
        <ul id="projects-list"></ul>
      </section>

      <section class="card" id="education-section">
        <h2 id="education-title"></h2>
        <ul id="education-list"></ul>
      </section>

      <section class="card" id="contact-section">
        <h2 id="contact-title"></h2>
        <p id="contact-message"></p>
        <ul id="contact-list"></ul>
      </section>
    </main>

    <footer class="footer">
      <p id="footer-text"></p>
    </footer>
  </div>

  <script src="content.js"></script>
</body>

</html>
